<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Demonstrations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Activity 1: CSS Positions</h1>

    <div class="container">
        <p>1. position: static</p>
        <img src="soccer.png" alt="Static" class="pos-static">
    </div>

    <div class="container">
        <p>2. position: relative</p>
        <img src="soccer.png" alt="Relative" class="pos-relative">
    </div>

    <div class="container relative-parent">
        <p>3. position: absolute</p>
        <img src="soccer.png" alt="Absolute" class="pos-absolute">
    </div>

    <div class="container">
        <p>4. position: fixed</p>
        <img src="soccer.png" alt="Fixed" class="pos-fixed">
    </div>

    <div class="container sticky-container">
        <p>5. position: sticky</p>
        <img src="soccer.png" alt="Sticky" class="pos-sticky">
    </div>

    <div class="container inherit-box">
        <p>6. position: inherit</p>
        <div class="inherited-parent">
            <img src="soccer.png" alt="Inherit" class="pos-inherit">
        </div>
    </div>

</body>
</html>
